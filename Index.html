<!DOCTYPE html>

<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Books From The Closet</title>

  <style>

    body {

      margin: 0;

      font-family: Arial, sans-serif;

      background: #0f0f0f;

      color: #ffffff;

      text-align: center;

    }

    header {

      padding: 60px 20px;

    }

    h1 {

      font-size: 40px;

      margin-bottom: 10px;

    }

    p {

      color: #bbb;

    }

    .grid {

      display: grid;

      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));

      gap: 20px;

      padding: 40px;

      max-width: 900px;

      margin: auto;

    }

    .book {

      background: #1c1c1c;

      padding: 20px;

      border-radius: 12px;

      transition: 0.2s;

    }

    .book:hover {

      transform: scale(1.05);

    }

    footer {

      padding: 40px;

      font-size: 12px;

      color: #666;

    }

  </style>

</head>

<body>

  <header>

    <h1>Books From The Closet</h1>

    <p>Stories. Grief. Creativity. Survival.</p>

  </header>

  <div class="grid">

    <div class="book">Book 1</div>

    <div class="book">Book 2</div>

    <div class="book">Book 3</div>

    <div class="book">Book 4</div>

    <div class="book">Book 5</div>

  </div>

  <footer>

    © 2026  Books From The Closet

  </footer>

</body>

</html>
